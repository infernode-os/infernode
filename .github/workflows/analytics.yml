name: Analytics snapshot

# Daily capture of GitHub metrics (release downloads, stars/forks/watchers,
# issues/PRs, traffic views/clones/referrers/paths) into analytics/.
# Time series the API doesn't expose natively (downloads-per-day, star
# growth curve, 14-day traffic) is built up one row at a time in
# analytics/snapshots.jsonl. Dashboard at analytics/README.md.

on:
  schedule:
    - cron: '17 3 * * *'   # daily, 03:17 UTC — off the top-of-hour spike
  workflow_dispatch:

permissions: {}

jobs:
  snapshot:
    name: Capture daily snapshot
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write   # commit analytics/ back to the default branch
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Capture snapshot
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 tools/github-analytics.py

      - name: Commit if changed
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain analytics/)" ]; then
            echo "no analytics changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add analytics/
          git commit -m "chore(analytics): daily snapshot $(date -u +%Y-%m-%d)"
          git push
