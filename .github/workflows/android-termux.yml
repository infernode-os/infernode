name: Android (Termux)

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # Termux on Android — Phase 0 hellaphone (INFR-107).
  # Runs build-android-termux.sh inside termux-docker
  # on a GitHub aarch64 runner so the Bionic compat
  # patches (lib9.h shims, audio-oss.c stub, alloc.c
  # malloc_usable_size const, libsec/securezero.c
  # fallback, etc.) can't silently regress.
  # See docs/HELLAPHONE.md, emu/Android/README.md.
  # ─────────────────────────────────────────────
  android-termux:
    name: Termux ARM64 build & smoke
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Build o.emu and smoke-boot inside termux-docker
      run: |
        set -euo pipefail
        # The container runs as a non-root Termux user; the bind-mounted
        # /work is owned by the GitHub runner UID (1001). Loosen perms so
        # the container can create Linux/arm64/{bin,lib} and write
        # *.o / *.a / o.emu under $PWD.
        chmod -R a+rwX "$PWD"
        docker run --rm \
          -v "$PWD":/work \
          -w /work \
          termux/termux-docker:aarch64 \
          bash -lc '
            set -euo pipefail

            # bash -lc does not always source the Termux profile that
            # sets PATH to include $PREFIX/bin (depends on termux-docker
            # version + image entrypoint). Set it explicitly so pkg and
            # apt-get are reachable.
            export PATH="/data/data/com.termux/files/usr/bin:$PATH"

            echo "::group::Termux sanity"
            uname -a
            uname -o
            echo "PREFIX=$PREFIX"
            echo "PATH=$PATH"
            command -v clang || true
            command -v sh || true
            command -v apt-get || true
            echo "::endgroup::"

            echo "::group::Install build prerequisites"
            # Skip pkg entirely — it is a Termux wrapper that has been
            # observed to disappear mid-upgrade (its own package gets
            # replaced by termux-tools and the new symlink is not yet
            # in place). apt-get is the underlying tool, lives next to
            # pkg in $PREFIX/bin/, and is stable. --no-install-recommends
            # keeps soft deps (ncurses-ui-libs etc.) out of the install
            # set; those are the primary source of the historical
            # version-skew failures.
            apt-get update -y
            apt-get install -y --no-install-recommends \
              clang make binutils pkg-config which perl git byacc
            echo "::endgroup::"

            echo "::group::Enable termux-exec LD_PRELOAD"
            # Termux normally sets termux-exec as LD_PRELOAD via its postinst,
            # which intercepts exec*() calls and rewrites hardcoded /bin/sh,
            # /usr/bin/sh, /system/bin/sh paths to $PREFIX/bin/sh. In termux-docker
            # the postinst skips this because getprop is missing (no /system/bin
            # bridge), so libc system(3) and any /bin/sh execve in mk, awk,
            # popen-using tools, etc. fail with 127. Set LD_PRELOAD explicitly
            # to make the environment behave like a real Termux. Without this,
            # emu/port/mkroot (an awk script that uses system("test -d ...") and
            # system(data2c ...)) exits 1 with no output.
            export LD_PRELOAD="$PREFIX/lib/libtermux-exec-ld-preload.so"
            echo "LD_PRELOAD=$LD_PRELOAD"
            test -f "$LD_PRELOAD" || { echo "::error::termux-exec preload library missing"; exit 1; }
            echo "::endgroup::"

            echo "::group::Phase 0 build (build-android-termux.sh headless)"
            # Invoke via sh so we don'\''t depend on the file having the
            # executable bit set inside the docker mount (the bit is also
            # being fixed in PR #98). sh respects the script'\''s shebang.
            sh build-android-termux.sh headless
            echo "::endgroup::"

            echo "::group::Verify build artifacts"
            test -x emu/Linux/o.emu     || { echo "::error::o.emu was not built"; exit 1; }
            test -x Linux/arm64/bin/mk  || { echo "::error::mk was not built";    exit 1; }
            test -x Linux/arm64/bin/limbo || { echo "::error::limbo was not built"; exit 1; }
            # ELF magic check (`file` is not in termux-docker base bootstrap).
            # Bytes 0-3 of any ELF are 0x7f 0x45 0x4c 0x46; byte 18 is the
            # machine type (0xb7 = EM_AARCH64). Termux has no /tmp, so keep
            # the hex blob in shell-state instead of an external temp file.
            elfhex=$(head -c 19 emu/Linux/o.emu | od -An -tx1 | tr -d " \n" || true)
            case "$elfhex" in
              7f454c46*b7) ;;
              7f454c46*)   echo "::error::o.emu is not aarch64 (machine byte: ${elfhex##*7f454c46})"; exit 1 ;;
              *)           echo "::error::o.emu is not an ELF file (header: $elfhex)"; exit 1 ;;
            esac
            ls -la emu/Linux/o.emu
            echo "::endgroup::"

            echo "::group::Phase 0 smoke (cat /dev/sysname, /dev/user, ls /dis | wc -l)"
            # 30s was too tight in CI containers (emu boot + shell + .dis
            # loading is markedly slower than on a handset). Bump to 120s.
            # `stdbuf -oL` line-buffers o.emu stdout so partial output makes
            # it to the log on timeout, instead of being lost in libc buffers.
            printf "%s\n" \
              "cat /dev/sysname" \
              "cat /dev/user" \
              "echo dis count: \`{ls /dis | wc -l}" \
              "echo phase 0 ok" \
              "exit" \
              | timeout 120 stdbuf -oL ./emu/Linux/o.emu -c1 -r"$PWD" /dis/sh.dis -l 2>&1 | tee /work/smoke.log || true
            echo "--- smoke.log snapshot ---"
            cat /work/smoke.log || true
            echo "--- end smoke.log ---"
            grep -q "phase 0 ok" /work/smoke.log || { echo "::error::smoke test did not reach phase 0 ok"; exit 1; }
            echo "::endgroup::"
          '

    - name: Upload smoke log
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: termux-smoke-log
        path: smoke.log
        if-no-files-found: ignore
        retention-days: 7
