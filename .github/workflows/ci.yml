      ROOT: ${{ github.workspace }}

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Stamp build version
      shell: powershell
      run: |
        $buildDate = Get-Date -Format "yyyyMMdd"
        $shortSha = $env:GITHUB_SHA.Substring(0, 8)
        $versionFile = "include/version.h"
        (Get-Content $versionFile) -replace 'InferNode 0.1', "InferNode 0.1 build $buildDate-$shortSha" | Set-Content $versionFile
        Write-Host "Version: $(Get-Content $versionFile)"

    - name: Install build dependencies
      shell: powershell
      run: |
        # Verify the package actually landed, not just choco's exit code.
        # The Chocolatey community feed intermittently returns an HTML
        # error page instead of XML ("not valid XML" -> "0/0 packages")
        # yet still exits 0, so an exit-code-only check goes green with no
        # bison installed and the build hangs scanning for it later. Probe
        # for win_bison.exe after each attempt and retry until it appears.
        $attempts = 3
        for ($attempt = 1; $attempt -le $attempts; $attempt++) {
          choco install winflexbison3 -y --no-progress
          $bin = Get-ChildItem -Path "$env:ProgramData\chocolatey\lib\winflexbison3" -Filter win_bison.exe -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($bin) {
            Write-Host "win_bison.exe installed at $($bin.FullName)"
            break
          }
          if ($attempt -eq $attempts) {
            throw "Failed to install winflexbison3 after $attempts attempts (win_bison.exe not found; likely a Chocolatey feed outage)"
          }
          Write-Warning "winflexbison3 not installed on attempt $attempt (choco exit $LASTEXITCODE, win_bison.exe missing); retrying..."
          Start-Sleep -Seconds (15 * $attempt)
        }

    - name: Setup MSVC environment
      uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1.13.0
      with:
        arch: amd64

    - name: Bootstrap build (mk, libraries, limbo, emulator)
      shell: powershell
      run: |
        .\build-windows-amd64.ps1

    - name: Verify emulator binary
      shell: powershell
      run: |
        if (-not (Test-Path 'emu\Nt\o.emu.exe')) {
          Write-Error "Emulator not built"
          exit 1
        }
        Get-Item 'emu\Nt\o.emu.exe'
        if (-not (Test-Path 'Nt\amd64\bin\limbo.exe')) {
          Write-Error "Limbo compiler not built"
          exit 1
        }

    - name: Run test suite (informational on Windows)
      shell: powershell
      # Windows-specific test-infrastructure issue: the test runner dies
      # after the first Inferno-shell test attempts mkdir on a nested
      # path that doesn't exist, before emitting the PASS/FAIL summary.
      # The same suite is green on Linux and macOS, and end-users have
      # verified the port works interactively. Treat the verdict as
      # informational until the runner is fixed (INFR-51).
      continue-on-error: true
      run: |
        # Create tmp directory inside Inferno root for tmp_writable test
        New-Item -ItemType Directory -Force -Path tmp

        Write-Host "Running test suite inside Inferno emulator..."
        # Match Linux/macOS: merge stderr into stdout via cmd /c, because
        # the test runner writes PASS/FAIL to fildes(2) and we grep one
        # combined transcript for the verdict.
        $emu = (Resolve-Path '.\emu\Nt\o.emu.exe').Path
        $proc = Start-Process -FilePath 'cmd.exe' -ArgumentList '/c', "`"$emu`" -c1 -r . /dis/tests/runner.dis -v > test-output.txt 2>&1" -NoNewWindow -PassThru
        $timedOut = $null
        $proc | Wait-Process -Timeout 60 -ErrorVariable timedOut -ErrorAction SilentlyContinue
        if ($timedOut) {
          Write-Host "Test process timed out after 60 seconds, killing..."
          $proc | Stop-Process -Force
        }

        Get-Content 'test-output.txt'

        $output = Get-Content 'test-output.txt' -Raw
        if ($output -match '(?m)^PASS$') {
          Write-Host "Tests passed."
        } elseif ($output -match '(?m)^FAIL$') {
          Write-Warning "Tests failed (non-blocking on Windows; see INFR-51)."
        } else {
          Write-Warning "No test result found in output (non-blocking on Windows; see INFR-51)."
        }

    - name: Run JIT correctness tests
      shell: powershell
      run: |
        Write-Host "Running JIT correctness tests (-c1)..."
        $emu = (Resolve-Path '.\emu\Nt\o.emu.exe').Path
        $proc = Start-Process -FilePath 'cmd.exe' -ArgumentList '/c', "`"$emu`" -c1 -r . /dis/jittest.dis > jit-test.txt 2>&1" -NoNewWindow -PassThru
        $timedOut = $null
        $proc | Wait-Process -Timeout 120 -ErrorVariable timedOut -ErrorAction SilentlyContinue
        if ($timedOut) {
          Write-Host "JIT test process timed out after 120 seconds, killing..."
          $proc | Stop-Process -Force
        }

        Get-Content 'jit-test.txt'

        $output = Get-Content 'jit-test.txt' -Raw
        if ($output -match '(?m)^PASS$') {
          Write-Host "JIT correctness tests: PASS"
        } else {
          Write-Error "JIT correctness tests: FAIL"
          exit 1
        }

    - name: Run JIT benchmarks (informational)
      shell: powershell
      run: |
        Write-Host "Running JIT benchmarks..."
        $emu = (Resolve-Path '.\emu\Nt\o.emu.exe').Path
        $proc = Start-Process -FilePath 'cmd.exe' -ArgumentList '/c', "`"$emu`" -c1 -r . /dis/jitbench2.dis > jit-bench.txt 2>&1" -NoNewWindow -PassThru
        $timedOut = $null
        $proc | Wait-Process -Timeout 180 -ErrorVariable timedOut -ErrorAction SilentlyContinue
        if ($timedOut) {
          Write-Host "JIT benchmark timed out after 180 seconds, killing..."
          $proc | Stop-Process -Force
        }

        Get-Content 'jit-bench.txt'
        Write-Host "JIT benchmarks complete (informational only)."

    - name: Upload Windows build artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: success()
      with:
        name: infernode-windows-amd64
        path: |
          emu\Nt\o.emu.exe
          Nt\amd64\bin\limbo.exe
          Nt\amd64\bin\mk.exe
        retention-days: 14
