name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # Ring-fence pre-flight: testing-only harness files must live
  # under tests/agent-harness/. Catches "someone moved serve-agent
  # back into lib/sh/" before any release build runs. See CLAUDE.md.
  # ─────────────────────────────────────────────
  ring-fence:
    name: Ring-fence (tests/agent-harness/)
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Verify serve-agent* files only under tests/agent-harness/
      run: |
        offenders=$(find . -path ./.git -prune -o \
          \( -name 'serve-agent*' -o -path '*agent-harness*' \) \
          -not -path './tests/agent-harness/*' \
          -not -path './tests/agent-harness' \
          -print 2>/dev/null | grep -v '^$' || true)
        if [ -n "$offenders" ]; then
          echo "FATAL: testing-only harness files found outside tests/agent-harness/:" >&2
          echo "$offenders" >&2
          echo "" >&2
          echo "These files must live under tests/agent-harness/ so CI guards" >&2
          echo "in release.yml can keep them out of shipped artefacts." >&2
          exit 1
        fi
        echo "Ring-fence OK: no testing-only harness files outside tests/agent-harness/."

  # ─────────────────────────────────────────────
  # Linux AMD64: Full bootstrap build from source
  # ─────────────────────────────────────────────
  linux-amd64:
    name: Linux AMD64 Build & Test
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      ROOT: ${{ github.workspace }}

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Stamp build version
      run: |
        BUILD_DATE=$(date +%Y%m%d)
        SHORT_SHA=${GITHUB_SHA::8}
        sed -i "s|InferNode 0.1|InferNode 0.1 build ${BUILD_DATE}-${SHORT_SHA}|" include/version.h
        echo "Version: $(cat include/version.h)"

    - name: Install build dependencies
      run: sudo apt-get update && sudo apt-get install -y build-essential libfido2-dev libudev-dev

    - name: Bootstrap build (mk, libraries, limbo, emulator)
      run: |
        chmod +x build-linux-amd64.sh
        # Explicit headless: this job installs no SDL3, so the script's
        # default sdl3 mode would fail the pkg-config check and fall back
        # to headless anyway. Pass it outright so the "headless build"
        # guarantee doesn't depend on that fallback (matches linux-arm64).
        ./build-linux-amd64.sh headless

    - name: Verify emulator binary
      run: |
        test -x emu/Linux/o.emu || { echo "Emulator not built"; exit 1; }
        file emu/Linux/o.emu
        test -x Linux/amd64/bin/limbo || { echo "Limbo compiler not built"; exit 1; }

    - name: Verify libfido2 linkage (/dev/2fa)
      run: |
        # libfido2-dev is installed, so the headless emu must link libfido2 or
        # the #F device would ship as a stub. Same guard as the GUI jobs.
        ldd emu/Linux/o.emu | grep -i libfido2 || { echo "Emulator not linked against libfido2 — /dev/2fa would be a stub"; exit 1; }

    - name: Compile test suite
      run: |
        LIMBO="$ROOT/Linux/amd64/bin/limbo"

        # Build the testing module first
        mkdir -p dis/tests dis/lib

        # Build testing library
        COMPILE_FAILURES=0
        if [ -d tests/testing ]; then
          cd tests/testing
          for f in *.b; do
            if [ -f "$f" ]; then
              if ! "$LIMBO" -I "$ROOT/module" -o "$ROOT/dis/lib/${f%.b}.dis" "$f" 2>&1; then
                echo "ERROR: Failed to compile testing/$f"
                COMPILE_FAILURES=$((COMPILE_FAILURES + 1))
              fi
            fi
          done
          cd "$ROOT"
        fi

        # Build test runner and test files into tests/ where the runner expects them
        cd tests
        for f in *.b; do
          name="${f%.b}"
          echo "Compiling $f..."
          if ! "$LIMBO" -I "$ROOT/module" -o "$ROOT/tests/$name.dis" "$f" 2>&1; then
            echo "ERROR: Failed to compile $f"
            COMPILE_FAILURES=$((COMPILE_FAILURES + 1))
          fi
        done
        cd "$ROOT"

        # Verify runner was compiled
        test -f tests/runner.dis || { echo "Test runner not compiled"; exit 1; }

        echo "Compiled test .dis files:"
        ls tests/*_test.dis 2>/dev/null | wc -l

        if [ "$COMPILE_FAILURES" -gt 0 ]; then
          echo "ERROR: $COMPILE_FAILURES test file(s) failed to compile"
          exit 1
        fi

    - name: Run namespace audit checks
      run: |
        echo "Running nsaudit security checks..."
        chmod +x tests/host/nsaudit_rules_test.sh
        chmod +x tests/host/nsaudit_profiles_test.sh
        chmod +x tests/host/nsaudit_path_semantics_test.sh
        chmod +x tests/host/namespace_path_policy_test.sh

        ROOT=. bash tests/host/nsaudit_rules_test.sh
        ROOT=. bash tests/host/nsaudit_profiles_test.sh
        ROOT=. bash tests/host/nsaudit_path_semantics_test.sh
        ROOT=. bash tests/host/namespace_path_policy_test.sh

    - name: Run llmsrv session capability checks
      run: |
        chmod +x tests/host/llmsrv_session_capability_test.sh
        ROOT=. tests/host/llmsrv_session_capability_test.sh

    - name: Run test suite
      run: |
        # Create /tmp inside Inferno root for tmp_writable test
        mkdir -p tmp

        echo "Running test suite inside Inferno emulator..."
        # Deterministic completion: emu never exits cleanly (kernel threads
        # keep it alive) and the suite legitimately runs for minutes
        # (crypto_test alone is ~170s), so a fixed `timeout` truncates it.
        # Run emu in the background and wait for the runner's own "Total:"
        # summary line, then stop it. The backstop (<< the job's
        # timeout-minutes) only bounds a genuine hang. No `timeout` (absent
        # on macOS) so the same shape works everywhere.
        ./emu/Linux/o.emu -c1 -r . /tests/runner.dis -v > test-output.txt 2>&1 &
        EMU_PID=$!
        START=$SECONDS
        while kill -0 $EMU_PID 2>/dev/null; do
          grep -q "^Total:" test-output.txt 2>/dev/null && break
          [ $((SECONDS-START)) -ge 480 ] && { echo "Backstop hit (480s) with no Total: line — possible hang."; break; }
          sleep 2
        done
        kill -9 $EMU_PID 2>/dev/null || true
        wait $EMU_PID 2>/dev/null || true

        cat test-output.txt

        # Result handling. The old check grepped "^PASS$", which matches the
        # per-module PASS line every test file emits — so the job could not
        # actually fail on a test failure, and (with the 60s cap) silently
        # truncated the suite while still reporting green. Now we key off the
        # runner's single "Total:" completion line and the per-module
        # "--- FAIL:" markers.
        #
        # TRANSITIONAL: gating is intentionally OFF. The cowfs deadlock that
        # truncated the suite at ~test 7 of 127 is fixed, so the previously
        # dark ~110 tests now run; this surfaces their true state in CI before
        # we enforce it. Do NOT add `exit 1` here until the surfaced failures
        # are triaged and an explicit skip-list is in place.
        if grep -q "^Total:" test-output.txt; then
          grep "^Total:" test-output.txt | tail -1
          if grep -q "^--- FAIL:" test-output.txt; then
            echo "::warning::Test suite has failing modules (NON-GATING, transitional):"
            grep "^--- FAIL:" test-output.txt || true
          else
            echo "Test suite: all modules passed."
          fi
        else
          echo "::warning::Runner did not reach a Total: line within the backstop (possible hang). Last test started:"
          grep "^=== RUN" test-output.txt | tail -1 || true
        fi

    - name: Run wallet and secstore integration tests
      run: |
        echo "Running host-side integration tests..."

        # wallet9p basic operations
        if [ -f tests/host/wallet9p_test.sh ]; then
          echo "--- wallet9p test ---"
          chmod +x tests/host/wallet9p_test.sh
          ROOT=. bash tests/host/wallet9p_test.sh > wallet9p-test.txt 2>&1 || true
          cat wallet9p-test.txt
          if grep -q "=== PASS ===" wallet9p-test.txt; then
            echo "wallet9p test: PASS"
          else
            echo "wallet9p test: SKIP (requires full Inferno namespace)"
          fi
        fi

        # wallet persistence (secstore round-trip)
        if [ -f tests/host/wallet_persist_test.sh ]; then
          echo "--- wallet persistence test ---"
          chmod +x tests/host/wallet_persist_test.sh
          ROOT=. bash tests/host/wallet_persist_test.sh > wallet-persist-test.txt 2>&1 || true
          cat wallet-persist-test.txt
          if grep -q "^PASS$" wallet-persist-test.txt; then
            echo "wallet persistence test: PASS"
          else
            echo "wallet persistence test: FAIL (non-fatal in CI)"
          fi
        fi

        # audit checkpoint signing (factotum-held key, ML-DSA-87)
        if [ -f tests/host/audit_signing_test.sh ]; then
          echo "--- audit signing test ---"
          chmod +x tests/host/audit_signing_test.sh
          ROOT=. bash tests/host/audit_signing_test.sh > audit-signing-test.txt 2>&1 || true
          cat audit-signing-test.txt
          if grep -q "=== PASS ===" audit-signing-test.txt; then
            echo "audit signing test: PASS"
          else
            echo "audit signing test: SKIP (requires full Inferno namespace)"
          fi
        fi

        # secstored failed-attempt lockout (AC-7 / FIA_AFL.1)
        if [ -f tests/host/secstore_lockout_test.sh ]; then
          echo "--- secstore lockout test ---"
          chmod +x tests/host/secstore_lockout_test.sh
          ROOT=. bash tests/host/secstore_lockout_test.sh > secstore-lockout-test.txt 2>&1 || true
          cat secstore-lockout-test.txt
          if grep -q "=== PASS ===" secstore-lockout-test.txt; then
            echo "secstore lockout test: PASS"
          else
            echo "secstore lockout test: SKIP (requires full Inferno namespace)"
          fi
        fi

    - name: Run presentation file-open regression test
      run: |
        # Boots the Lucifer GUI headless and asserts the file-open contract:
        # Tasks tab present (with the plumber both up and absent), and files
        # route by type (pdf/image/markdown -> presentation, else editor).
        # Non-fatal in CI (full GUI boot can be timing-sensitive).
        if [ -f tests/host/presentation_fileopen_test.sh ]; then
          echo "--- presentation file-open regression test ---"
          chmod +x tests/host/presentation_fileopen_test.sh
          ROOT=. bash tests/host/presentation_fileopen_test.sh > pres-fileopen-test.txt 2>&1 || true
          cat pres-fileopen-test.txt
          if grep -q ", 0 failed," pres-fileopen-test.txt; then
            echo "presentation file-open test: PASS"
          else
            echo "presentation file-open test: SKIP/FAIL (GUI boot timing-sensitive in CI)"
          fi
        fi

    - name: Run JIT correctness tests
      run: |
        echo "Running JIT correctness tests (-c1)..."
        timeout 120 ./emu/Linux/o.emu -c1 -r . /dis/jittest.dis > jit-test.txt 2>&1 < /dev/null || true
        cat jit-test.txt
        if grep -q "^PASS$" jit-test.txt; then
          echo "JIT correctness tests: PASS"
        else
          echo "JIT correctness tests: FAIL"
          exit 1
        fi

    - name: Run JIT boot smoke test
      run: |
        chmod +x tests/host/jit_boot_test.sh
        tests/host/jit_boot_test.sh

    - name: Upload Linux build artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: success()
      with:
        name: infernode-linux-amd64
        path: |
          emu/Linux/o.emu
          Linux/amd64/bin/limbo
          Linux/amd64/bin/mk
        retention-days: 14

  # ─────────────────────────────────────────────
  # GoDis: Go-to-Dis compiler (tools/godis).
  # Unit/encoding tests run anywhere; the E2E suite compiles the
  # testdata Go programs to Dis and executes them on the emulator,
  # reusing the o.emu artifact built by linux-amd64 (no rebuild).
  # ─────────────────────────────────────────────
  godis:
    name: GoDis (Go → Dis) Build & Test
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs: linux-amd64
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Download prebuilt emulator
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: infernode-linux-amd64
        path: .

    - name: Restore emulator exec bit
      # upload/download-artifact does not preserve the executable bit.
      run: |
        chmod +x emu/Linux/o.emu
        test -x emu/Linux/o.emu || { echo "emulator not executable"; exit 1; }
        file emu/Linux/o.emu

    - name: Vet and build
      working-directory: tools/godis
      run: |
        go version
        go vet ./...
        go build ./...

    - name: Run GoDis test suite (unit + E2E on emu)
      working-directory: tools/godis
      # findEmu() resolves ../../../emu/Linux/o.emu and findRoot() the repo
      # root; the E2E tests skip gracefully if the emulator is absent, so an
      # explicit presence check keeps a missing artifact from silently
      # downgrading this job to compile-only.
      #
      # This also runs difftest's TestE2ELocked, the differential-testing
      # regression gate: every program in _corpus/locked.txt must still produce
      # identical output under godis -c0, godis -c1, AND `go run`. A locked
      # program drifting in any mode (including a -c0/-c1 JIT-only divergence)
      # fails the build.
      run: |
        test -x ../../emu/Linux/o.emu || { echo "emulator missing; E2E would be skipped"; exit 1; }
        go test ./... -v

    - name: Differential report (godis -c0/-c1 vs go run)
      working-directory: tools/godis
      # Non-blocking: the locked-corpus gate above is what fails the build. This
      # step publishes the full diff (matches, divergences, JIT mismatches,
      # crashes) for the whole corpus to the job summary and uploads JSON, so
      # new divergences are visible without breaking unrelated PRs.
      if: always()
      continue-on-error: true
      run: |
        go run ./cmd/difftest -quiet -timeout 5s \
          -md "$GITHUB_STEP_SUMMARY" -json difftest-report.json \
          testdata _corpus

    - name: Upload differential report
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: always()
      with:
        name: godis-difftest-report
        path: tools/godis/difftest-report.json
        retention-days: 14

  # ─────────────────────────────────────────────
  # Linux AMD64 GUI: SDL3 build from source
  # ─────────────────────────────────────────────
  linux-amd64-gui:
    name: Linux AMD64 SDL3 GUI Build & Test
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      contents: read
    env:
      ROOT: ${{ github.workspace }}

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Stamp build version
      run: |
        BUILD_DATE=$(date +%Y%m%d)
        SHORT_SHA=${GITHUB_SHA::8}
        sed -i "s|InferNode 0.1|InferNode 0.1 build ${BUILD_DATE}-${SHORT_SHA}|" include/version.h
        echo "Version: $(cat include/version.h)"

    - name: Install build dependencies
      run: |
        sudo apt-get update && sudo apt-get install -y \
          build-essential cmake ninja-build \
          libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxi-dev libxss-dev \
          libwayland-dev libxkbcommon-dev libegl-dev libgles-dev \
          libxtst-dev libdrm-dev libgbm-dev \
          libfido2-dev libudev-dev \
          patchelf

    - name: Build SDL3 from source
      run: |
        chmod +x install-sdl3.sh
        ./install-sdl3.sh

    - name: Build (SDL3 GUI)
      run: |
        chmod +x build-linux-amd64.sh
        ./build-linux-amd64.sh

    - name: Verify build
      run: |
        test -x emu/Linux/o.emu || { echo "Emulator not built"; exit 1; }
        test -x Linux/amd64/bin/limbo || { echo "Limbo compiler not built"; exit 1; }

    - name: Verify SDL3 linkage
      run: |
        ldd emu/Linux/o.emu | grep libSDL3 || { echo "Emulator not linked against SDL3"; exit 1; }

    - name: Verify libfido2 linkage (/dev/2fa)
      run: |
        # libfido2-dev was installed above, so the GUI emu must link libfido2 —
        # otherwise the #F (2fa) device degraded to its stub and YubiKey enroll
        # would dead-end with "insert your security key first". This guard is the
        # Linux analogue of the macOS HAVE_FIDO2 CI check (INFR-358).
        ldd emu/Linux/o.emu | grep -i libfido2 || { echo "Emulator not linked against libfido2 — /dev/2fa would be a stub"; exit 1; }

    - name: Compile test suite
      run: |
        LIMBO="$ROOT/Linux/amd64/bin/limbo"

        # Build the testing module first
        mkdir -p dis/tests dis/lib

        # Build testing library
        COMPILE_FAILURES=0
        if [ -d tests/testing ]; then
          cd tests/testing
          for f in *.b; do
            if [ -f "$f" ]; then
              if ! "$LIMBO" -I "$ROOT/module" -o "$ROOT/dis/lib/${f%.b}.dis" "$f" 2>&1; then
                echo "ERROR: Failed to compile testing/$f"
                COMPILE_FAILURES=$((COMPILE_FAILURES + 1))
              fi
            fi
          done
          cd "$ROOT"
        fi

        # Build test runner and test files into tests/ where the runner expects them
        cd tests
        for f in *.b; do
          name="${f%.b}"
          echo "Compiling $f..."
          if ! "$LIMBO" -I "$ROOT/module" -o "$ROOT/tests/$name.dis" "$f" 2>&1; then
            echo "ERROR: Failed to compile $f"
            COMPILE_FAILURES=$((COMPILE_FAILURES + 1))
          fi
        done
        cd "$ROOT"

        # Verify runner was compiled
        test -f tests/runner.dis || { echo "Test runner not compiled"; exit 1; }

        echo "Compiled test .dis files:"
        ls tests/*_test.dis 2>/dev/null | wc -l

        if [ "$COMPILE_FAILURES" -gt 0 ]; then
          echo "ERROR: $COMPILE_FAILURES test file(s) failed to compile"
          exit 1
        fi

    - name: Run test suite
      env:
        SDL_VIDEODRIVER: dummy
      run: |
        # Create /tmp inside Inferno root for tmp_writable test
        mkdir -p tmp

        echo "Running test suite inside Inferno emulator..."
        # Deterministic completion: emu never exits cleanly (kernel threads
        # keep it alive) and the suite legitimately runs for minutes
        # (crypto_test alone is ~170s), so a fixed `timeout` truncates it.
        # Run emu in the background and wait for the runner's own "Total:"
        # summary line, then stop it. The backstop (<< the job's
        # timeout-minutes) only bounds a genuine hang. No `timeout` (absent
        # on macOS) so the same shape works everywhere.
        ./emu/Linux/o.emu -c1 -r . /tests/runner.dis -v > test-output.txt 2>&1 &
        EMU_PID=$!
        START=$SECONDS
        while kill -0 $EMU_PID 2>/dev/null; do
          grep -q "^Total:" test-output.txt 2>/dev/null && break
          [ $((SECONDS-START)) -ge 480 ] && { echo "Backstop hit (480s) with no Total: line — possible hang."; break; }
          sleep 2
        done
        kill -9 $EMU_PID 2>/dev/null || true
        wait $EMU_PID 2>/dev/null || true

        cat test-output.txt

        # Result handling. The old check grepped "^PASS$", which matches the
        # per-module PASS line every test file emits — so the job could not
        # actually fail on a test failure, and (with the 60s cap) silently
        # truncated the suite while still reporting green. Now we key off the
        # runner's single "Total:" completion line and the per-module
        # "--- FAIL:" markers.
        #
        # TRANSITIONAL: gating is intentionally OFF. The cowfs deadlock that
        # truncated the suite at ~test 7 of 127 is fixed, so the previously
        # dark ~110 tests now run; this surfaces their true state in CI before
        # we enforce it. Do NOT add `exit 1` here until the surfaced failures
        # are triaged and an explicit skip-list is in place.
        if grep -q "^Total:" test-output.txt; then
          grep "^Total:" test-output.txt | tail -1
          if grep -q "^--- FAIL:" test-output.txt; then
            echo "::warning::Test suite has failing modules (NON-GATING, transitional):"
            grep "^--- FAIL:" test-output.txt || true
          else
            echo "Test suite: all modules passed."
          fi
        else
          echo "::warning::Runner did not reach a Total: line within the backstop (possible hang). Last test started:"
          grep "^=== RUN" test-output.txt | tail -1 || true
        fi

    - name: Run wallet and secstore integration tests
      run: |
        echo "Running host-side integration tests..."

        # wallet9p basic operations
        if [ -f tests/host/wallet9p_test.sh ]; then
          echo "--- wallet9p test ---"
          chmod +x tests/host/wallet9p_test.sh
          ROOT=. bash tests/host/wallet9p_test.sh > wallet9p-test.txt 2>&1 || true
          cat wallet9p-test.txt
          if grep -q "=== PASS ===" wallet9p-test.txt; then
            echo "wallet9p test: PASS"
          else
            echo "wallet9p test: SKIP (requires full Inferno namespace)"
          fi
        fi

        # wallet persistence (secstore round-trip)
        if [ -f tests/host/wallet_persist_test.sh ]; then
          echo "--- wallet persistence test ---"
          chmod +x tests/host/wallet_persist_test.sh
          ROOT=. bash tests/host/wallet_persist_test.sh > wallet-persist-test.txt 2>&1 || true
          cat wallet-persist-test.txt
          if grep -q "^PASS$" wallet-persist-test.txt; then
            echo "wallet persistence test: PASS"
          else
            echo "wallet persistence test: FAIL (non-fatal in CI)"
          fi
        fi

        # audit checkpoint signing (factotum-held key, ML-DSA-87)
        if [ -f tests/host/audit_signing_test.sh ]; then
          echo "--- audit signing test ---"
          chmod +x tests/host/audit_signing_test.sh
          ROOT=. bash tests/host/audit_signing_test.sh > audit-signing-test.txt 2>&1 || true
          cat audit-signing-test.txt
          if grep -q "=== PASS ===" audit-signing-test.txt; then
            echo "audit signing test: PASS"
          else
            echo "audit signing test: SKIP (requires full Inferno namespace)"
          fi
        fi

        # secstored failed-attempt lockout (AC-7 / FIA_AFL.1)
        if [ -f tests/host/secstore_lockout_test.sh ]; then
          echo "--- secstore lockout test ---"
          chmod +x tests/host/secstore_lockout_test.sh
          ROOT=. bash tests/host/secstore_lockout_test.sh > secstore-lockout-test.txt 2>&1 || true
          cat secstore-lockout-test.txt
          if grep -q "=== PASS ===" secstore-lockout-test.txt; then
            echo "secstore lockout test: PASS"
          else
            echo "secstore lockout test: SKIP (requires full Inferno namespace)"
          fi
        fi

    - name: Run JIT correctness tests
      env:
        SDL_VIDEODRIVER: dummy
      run: |
        echo "Running JIT correctness tests (-c1)..."
        timeout 120 ./emu/Linux/o.emu -c1 -r . /dis/jittest.dis > jit-test.txt 2>&1 < /dev/null || true
        cat jit-test.txt
        if grep -q "^PASS$" jit-test.txt; then
          echo "JIT correctness tests: PASS"
        else
          echo "JIT correctness tests: FAIL"
          exit 1
        fi

    - name: Run JIT boot smoke test
      env:
        SDL_VIDEODRIVER: dummy
      run: |
        chmod +x tests/host/jit_boot_test.sh
        SDL_VIDEODRIVER=dummy tests/host/jit_boot_test.sh

    - name: Upload Linux GUI build artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: success()
      with:
        name: infernode-linux-amd64-gui
        path: |
          emu/Linux/o.emu
          Linux/amd64/bin/limbo
          Linux/amd64/bin/mk
        retention-days: 14

  # ─────────────────────────────────────────────
  # Linux ARM64: Full bootstrap build from source
  # ─────────────────────────────────────────────
  linux-arm64:
    name: Linux ARM64 Build & Test
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      ROOT: ${{ github.workspace }}

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Stamp build version
      run: |
        BUILD_DATE=$(date +%Y%m%d)
        SHORT_SHA=${GITHUB_SHA::8}
        sed -i "s|InferNode 0.1|InferNode 0.1 build ${BUILD_DATE}-${SHORT_SHA}|" include/version.h
        echo "Version: $(cat include/version.h)"

    - name: Install build dependencies
      run: sudo apt-get update && sudo apt-get install -y build-essential libfido2-dev libudev-dev

    - name: Bootstrap build (mk, libraries, limbo, emulator)
      run: |
        chmod +x build-linux-arm64.sh
        ./build-linux-arm64.sh headless

    - name: Verify emulator binary
      run: |
        test -x emu/Linux/o.emu || { echo "Emulator not built"; exit 1; }
        file emu/Linux/o.emu
        test -x Linux/arm64/bin/limbo || { echo "Limbo compiler not built"; exit 1; }

    - name: Verify libfido2 linkage (/dev/2fa)
      run: |
        # libfido2-dev is installed, so the headless emu must link libfido2 or
        # the #F device would ship as a stub. Same guard as the GUI jobs.
        ldd emu/Linux/o.emu | grep -i libfido2 || { echo "Emulator not linked against libfido2 — /dev/2fa would be a stub"; exit 1; }

    - name: Compile test suite
      run: |
        LIMBO="$ROOT/Linux/arm64/bin/limbo"

        # Build the testing module first
        mkdir -p dis/tests dis/lib

        # Build testing library
        COMPILE_FAILURES=0
        if [ -d tests/testing ]; then
          cd tests/testing
          for f in *.b; do
            if [ -f "$f" ]; then
              if ! "$LIMBO" -I "$ROOT/module" -o "$ROOT/dis/lib/${f%.b}.dis" "$f" 2>&1; then
                echo "ERROR: Failed to compile testing/$f"
                COMPILE_FAILURES=$((COMPILE_FAILURES + 1))
              fi
            fi
          done
          cd "$ROOT"
        fi

        # Build test runner and test files into tests/ where the runner expects them
        cd tests
        for f in *.b; do
          name="${f%.b}"
          echo "Compiling $f..."
          if ! "$LIMBO" -I "$ROOT/module" -o "$ROOT/tests/$name.dis" "$f" 2>&1; then
            echo "ERROR: Failed to compile $f"
            COMPILE_FAILURES=$((COMPILE_FAILURES + 1))
          fi
        done
        cd "$ROOT"

        # Verify runner was compiled
        test -f tests/runner.dis || { echo "Test runner not compiled"; exit 1; }

        echo "Compiled test .dis files:"
        ls tests/*_test.dis 2>/dev/null | wc -l

        if [ "$COMPILE_FAILURES" -gt 0 ]; then
          echo "ERROR: $COMPILE_FAILURES test file(s) failed to compile"
          exit 1
        fi

    - name: Run test suite
      run: |
        # Create /tmp inside Inferno root for tmp_writable test
        mkdir -p tmp

        echo "Running test suite inside Inferno emulator..."
        # Deterministic completion: emu never exits cleanly (kernel threads
        # keep it alive) and the suite legitimately runs for minutes
        # (crypto_test alone is ~170s), so a fixed `timeout` truncates it.
        # Run emu in the background and wait for the runner's own "Total:"
        # summary line, then stop it. The backstop (<< the job's
        # timeout-minutes) only bounds a genuine hang. No `timeout` (absent
        # on macOS) so the same shape works everywhere.
        ./emu/Linux/o.emu -c1 -r . /tests/runner.dis -v > test-output.txt 2>&1 &
        EMU_PID=$!
        START=$SECONDS
        while kill -0 $EMU_PID 2>/dev/null; do
          grep -q "^Total:" test-output.txt 2>/dev/null && break
          [ $((SECONDS-START)) -ge 480 ] && { echo "Backstop hit (480s) with no Total: line — possible hang."; break; }
          sleep 2
        done
        kill -9 $EMU_PID 2>/dev/null || true
        wait $EMU_PID 2>/dev/null || true

        cat test-output.txt

        # Result handling. The old check grepped "^PASS$", which matches the
        # per-module PASS line every test file emits — so the job could not
        # actually fail on a test failure, and (with the 60s cap) silently
        # truncated the suite while still reporting green. Now we key off the
        # runner's single "Total:" completion line and the per-module
        # "--- FAIL:" markers.
        #
        # TRANSITIONAL: gating is intentionally OFF. The cowfs deadlock that
        # truncated the suite at ~test 7 of 127 is fixed, so the previously
        # dark ~110 tests now run; this surfaces their true state in CI before
        # we enforce it. Do NOT add `exit 1` here until the surfaced failures
        # are triaged and an explicit skip-list is in place.
        if grep -q "^Total:" test-output.txt; then
          grep "^Total:" test-output.txt | tail -1
          if grep -q "^--- FAIL:" test-output.txt; then
            echo "::warning::Test suite has failing modules (NON-GATING, transitional):"
            grep "^--- FAIL:" test-output.txt || true
          else
            echo "Test suite: all modules passed."
          fi
        else
          echo "::warning::Runner did not reach a Total: line within the backstop (possible hang). Last test started:"
          grep "^=== RUN" test-output.txt | tail -1 || true
        fi

    - name: Run wallet and secstore integration tests
      run: |
        echo "Running host-side integration tests..."

        # wallet9p basic operations
        if [ -f tests/host/wallet9p_test.sh ]; then
          echo "--- wallet9p test ---"
          chmod +x tests/host/wallet9p_test.sh
          ROOT=. bash tests/host/wallet9p_test.sh > wallet9p-test.txt 2>&1 || true
          cat wallet9p-test.txt
          if grep -q "=== PASS ===" wallet9p-test.txt; then
            echo "wallet9p test: PASS"
          else
            echo "wallet9p test: SKIP (requires full Inferno namespace)"
          fi
        fi

        # wallet persistence (secstore round-trip)
        if [ -f tests/host/wallet_persist_test.sh ]; then
          echo "--- wallet persistence test ---"
          chmod +x tests/host/wallet_persist_test.sh
          ROOT=. bash tests/host/wallet_persist_test.sh > wallet-persist-test.txt 2>&1 || true
          cat wallet-persist-test.txt
          if grep -q "^PASS$" wallet-persist-test.txt; then
            echo "wallet persistence test: PASS"
          else
            echo "wallet persistence test: FAIL (non-fatal in CI)"
          fi
        fi

    - name: Upload Linux ARM64 build artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: success()
      with:
        name: infernode-linux-arm64
        path: |
          emu/Linux/o.emu
          Linux/arm64/bin/limbo
          Linux/arm64/bin/mk
        retention-days: 14

