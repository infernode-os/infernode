      run: |
        chmod +x install-sdl3.sh
        ./install-sdl3.sh

    - name: Build (SDL3 GUI)
      run: |
        chmod +x build-linux-arm64.sh
        ./build-linux-arm64.sh

    - name: Verify build
      run: |
        test -x emu/Linux/o.emu || { echo "Emulator not built"; exit 1; }
        test -x Linux/arm64/bin/limbo || { echo "Limbo compiler not built"; exit 1; }
        test -x Linux/arm64/bin/mk || { echo "mk not built"; exit 1; }

    - name: Verify SDL3 linkage
      run: |
        ldd emu/Linux/o.emu | grep libSDL3 || { echo "Emulator not linked against SDL3"; exit 1; }

    - name: Verify libfido2 linkage (/dev/2fa)
      run: |
        # libfido2-dev is installed, so the GUI emu must link libfido2 or the #F
        # (2fa) device degraded to a stub and YubiKey enrollment would dead-end.
        # Linux analogue of the macOS HAVE_FIDO2 guard (INFR-358).
        ldd emu/Linux/o.emu | grep -i libfido2 || { echo "Emulator not linked against libfido2 — /dev/2fa would be a stub"; exit 1; }

    - name: Compile test suite
      run: |
        LIMBO="$ROOT/Linux/arm64/bin/limbo"

        mkdir -p dis/tests dis/lib

        COMPILE_FAILURES=0
        if [ -d tests/testing ]; then
          cd tests/testing
          for f in *.b; do
            if [ -f "$f" ]; then
              if ! "$LIMBO" -I "$ROOT/module" -o "$ROOT/dis/lib/${f%.b}.dis" "$f" 2>&1; then
                echo "ERROR: Failed to compile testing/$f"
                COMPILE_FAILURES=$((COMPILE_FAILURES + 1))
              fi
            fi
          done
          cd "$ROOT"
        fi

        cd tests
        for f in *.b; do
          name="${f%.b}"
          echo "Compiling $f..."
          if ! "$LIMBO" -I "$ROOT/module" -o "$ROOT/tests/$name.dis" "$f" 2>&1; then
            echo "ERROR: Failed to compile $f"
            COMPILE_FAILURES=$((COMPILE_FAILURES + 1))
          fi
        done
        cd "$ROOT"

        test -f tests/runner.dis || { echo "Test runner not compiled"; exit 1; }

        echo "Compiled test .dis files:"
        ls tests/*_test.dis 2>/dev/null | wc -l

        if [ "$COMPILE_FAILURES" -gt 0 ]; then
          echo "ERROR: $COMPILE_FAILURES test file(s) failed to compile"
          exit 1
        fi

    - name: Run test suite
      env:
        SDL_VIDEODRIVER: dummy
      run: |
        mkdir -p tmp

        echo "Running test suite inside Inferno emulator..."
        timeout 60 ./emu/Linux/o.emu -c1 -r . /tests/runner.dis -v > test-output.txt 2>&1 || true

        cat test-output.txt

        if grep -q "^PASS$" test-output.txt; then
          echo "Tests passed."
        elif grep -q "^FAIL$" test-output.txt; then
          echo "Tests failed."
          exit 1
        else
          echo "No test result found in output — tests may not have run."
          exit 1
        fi

    - name: Run wallet and secstore integration tests
      run: |
        echo "Running host-side integration tests..."

        if [ -f tests/host/wallet9p_test.sh ]; then
          echo "--- wallet9p test ---"
          chmod +x tests/host/wallet9p_test.sh
          ROOT=. bash tests/host/wallet9p_test.sh > wallet9p-test.txt 2>&1 || true
          cat wallet9p-test.txt
          if grep -q "=== PASS ===" wallet9p-test.txt; then
            echo "wallet9p test: PASS"
          else
            echo "wallet9p test: SKIP (requires full Inferno namespace)"
          fi
        fi

        if [ -f tests/host/wallet_persist_test.sh ]; then
          echo "--- wallet persistence test ---"
          chmod +x tests/host/wallet_persist_test.sh
          ROOT=. bash tests/host/wallet_persist_test.sh > wallet-persist-test.txt 2>&1 || true
          cat wallet-persist-test.txt
          if grep -q "^PASS$" wallet-persist-test.txt; then
            echo "wallet persistence test: PASS"
          else
            echo "wallet persistence test: FAIL (non-fatal in CI)"
          fi
        fi

    - name: Prepare self-contained binary
      run: |
        # Set RPATH so the emulator finds libSDL3.so.0 in its own directory
        patchelf --set-rpath '$ORIGIN' emu/Linux/o.emu

        # Verify
        echo "RPATH set to:"
        patchelf --print-rpath emu/Linux/o.emu

    - name: Package self-contained tarball
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        STAGE="infernode-${VERSION}-linux-arm64-gui"
        mkdir -p "$STAGE/bin" "$STAGE/resources"

        # GUI launcher (user runs this)
        cp Linux/infernode "$STAGE/"
        chmod +x "$STAGE/infernode"

        # Desktop integration
        cp Linux/infernode.desktop "$STAGE/"
        cp Nt/Assets/Square150x150Logo.png "$STAGE/infernode.png"

        # Build scripts
        cp build-linux-arm64.sh install-sdl3.sh "$STAGE/"

        # Desktop / PATH integration helper (icon + dock, or PATH wrapper)
        cp setup-desktop.sh "$STAGE/"
        chmod +x "$STAGE/setup-desktop.sh"

        # Docs and legal
        for f in LICENCE NOTICE TRADEMARK.md README.md QUICKSTART.md; do
          [ -f "$f" ] && cp "$f" "$STAGE/"
        done

        cp emu/Linux/o.emu "$STAGE/bin/emu"

        # Find and bundle libSDL3.so.0
        SDL3_LIB=$(ldd emu/Linux/o.emu | grep libSDL3 | awk '{print $3}')
        cp "$SDL3_LIB" "$STAGE/bin/libSDL3.so.0"

        # Bundle libfido2 (+ its non-system dep libcbor) next to the binary so
        # /dev/2fa works without the user installing libfido2-dev. libudev and
        # libcrypto are near-universal on desktop Linux, so they stay as system
        # deps; libcbor is not, so it is bundled. emu already has RUNPATH=$ORIGIN
        # (set above); libfido2 gets the same so it resolves the bundled libcbor.
        FIDO2_LIB=$(ldd emu/Linux/o.emu | grep -i libfido2 | awk '{print $3}')
        if [ -n "$FIDO2_LIB" ] && [ -f "$FIDO2_LIB" ]; then
          cp -L "$FIDO2_LIB" "$STAGE/bin/$(basename "$FIDO2_LIB")"
          patchelf --set-rpath '$ORIGIN' "$STAGE/bin/$(basename "$FIDO2_LIB")" || true
          CBOR_LIB=$(ldd "$FIDO2_LIB" | grep -i libcbor | awk '{print $3}')
          if [ -n "$CBOR_LIB" ] && [ -f "$CBOR_LIB" ]; then
            cp -L "$CBOR_LIB" "$STAGE/bin/$(basename "$CBOR_LIB")"
          fi
          echo "Bundled FIDO2 runtime: $(ls "$STAGE"/bin/libfido2* "$STAGE"/bin/libcbor* 2>/dev/null)"
        else
          echo "WARNING: libfido2 not linked — /dev/2fa will be a stub in this artifact" >&2
        fi

        # Native tools
        cp Linux/arm64/bin/limbo Linux/arm64/bin/mk "$STAGE/bin/"

        # Runtime tree into resources/
        for d in dis lib fonts module services locale usr mnt; do
          [ -d "$d" ] && cp -a "$d" "$STAGE/resources/"
        done
        mkdir -p "$STAGE/resources/tmp"

        # mkconfig and mkfiles
        cp mkconfig "$STAGE/resources/"
        [ -d mkfiles ] && cp -a mkfiles "$STAGE/resources/"

        # Distribution defaults for LLM config
        cat > "$STAGE/resources/lib/ndb/llm" << 'LLMCONF'
        mode=local
        backend=api
        url=https://api.anthropic.com
        model=claude-sonnet-4-5-20250929
        dial=
        LLMCONF

        # CI guard: refuse to ship testing-only harness files. See CLAUDE.md
        # ring-fence rule. Load-bearing — survives source-tree refactor.
        if find "$STAGE" \( -name 'serve-agent*' -o -path '*agent-harness*' \) -print -quit | grep -q .; then
          echo "FATAL: testing-only harness files found in release stage:" >&2
          find "$STAGE" \( -name 'serve-agent*' -o -path '*agent-harness*' \) >&2
          exit 1
        fi

        tar czf "${STAGE}.tar.gz" -C "$STAGE" .
        echo "Archive: $(ls -lh ${STAGE}.tar.gz)"

    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: infernode-linux-arm64-gui-archive
        path: infernode-*-linux-arm64-gui.tar.gz
        retention-days: 3

  # ─────────────────────────────────────────────
  # macOS ARM64: SDL3 GUI emulator + .app bundle
  # ─────────────────────────────────────────────
  macos-arm64:
    name: macOS ARM64
    runs-on: macos-15
    timeout-minutes: 60
    permissions:
      contents: read
    env:
      ROOT: ${{ github.workspace }}

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Extract version from tag
      id: version
      run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

    - name: Stamp build version
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        BUILD_DATE=$(date +%Y%m%d)
        SHORT_SHA=${GITHUB_SHA::8}
        sed -i '' "s|InferNode 0.1|InferNode ${VERSION} build ${BUILD_DATE}-${SHORT_SHA}|" include/version.h
        echo "Version: $(cat include/version.h)"

    - name: Install SDL3, opus and libfido2
      run: brew install sdl3 sdl3_ttf opus libfido2

    - name: Build mk
      run: |
        chmod +x makemk.sh
        ./makemk.sh
        test -x MacOSX/arm64/bin/mk || { echo "mk build failed"; exit 1; }

    - name: Build system libraries
      run: |
        export PATH="$ROOT/MacOSX/arm64/bin:/usr/bin:/bin"
        for dir in lib9 libbio libmp libsec libmath; do
          echo "Building $dir..."
          (cd $dir && "$ROOT/MacOSX/arm64/bin/mk" install) || exit 1
        done

    - name: Build limbo compiler
      run: |
        export PATH="$ROOT/MacOSX/arm64/bin:/usr/bin:/bin"
        (cd limbo && "$ROOT/MacOSX/arm64/bin/mk" install) || exit 1
        test -x MacOSX/arm64/bin/limbo || { echo "limbo not found"; exit 1; }

    - name: Build libinterp and remaining libraries
      run: |
        export PATH="$ROOT/MacOSX/arm64/bin:/usr/bin:/bin"
        (cd libinterp && "$ROOT/MacOSX/arm64/bin/mk" install) || exit 1
        for dir in libfreetype libkeyring libdraw libmemdraw libmemlayer; do
          echo "Building $dir..."
          (cd $dir && "$ROOT/MacOSX/arm64/bin/mk" install) || true
        done

    - name: Build SDL3 GUI emulator
      run: |
        export PATH="$ROOT/MacOSX/arm64/bin:/usr/bin:/bin"
        cd emu/MacOSX
        mk clean 2>/dev/null || true
        OBJTYPE=arm64 SYSTARG=MacOSX SHELL=/bin/sh mk GUIBACK=sdl3
        test -f o.emu || { echo "Emulator build failed"; exit 1; }

    - name: Prepare macOS binary
      run: |
        # Copy o.emu to InferNode so macOS shows correct app name in Dock/menu
        cp emu/MacOSX/o.emu emu/MacOSX/InferNode

        # Bundle SDL3 dylib next to the binary
        SDL3_DYLIB=$(otool -L emu/MacOSX/InferNode | grep libSDL3 | awk '{print $1}')
        cp "$SDL3_DYLIB" emu/MacOSX/libSDL3.0.dylib

        # Rewrite InferNode to load SDL3 from its own directory
        install_name_tool -change "$SDL3_DYLIB" \
          @executable_path/libSDL3.0.dylib emu/MacOSX/InferNode

        # Bundle libfido2 (YubiKey/FIDO2 support for /dev/2fa) and its
        # transitive deps — libcbor, libcrypto. Unlike SDL3 these reference
        # each other, so walk the tree with otool and rewrite every Homebrew
        # load command to @executable_path. Versioned names (libcbor.0.13,
        # libcrypto.3) drift with Homebrew, so discover them rather than
        # hardcode. Without this the release links against /opt/homebrew paths
        # absent on an end user's Mac and FIDO2 enrollment silently no-ops.
        bundle_homebrew_deps() {
          # $1 = mach-o file in emu/MacOSX/ to rewrite in place.
          otool -L "$1" | awk '/\/opt\/homebrew\// {print $1}' | while read -r dep; do
            base=$(basename "$dep")
            if [ ! -f "emu/MacOSX/$base" ]; then
              cp "$dep" "emu/MacOSX/$base"
              chmod u+w "emu/MacOSX/$base"
              install_name_tool -id "@executable_path/$base" "emu/MacOSX/$base"
              bundle_homebrew_deps "emu/MacOSX/$base"   # recurse into the copy
            fi
            install_name_tool -change "$dep" "@executable_path/$base" "$1"
          done
        }
        bundle_homebrew_deps emu/MacOSX/InferNode

        # Verify: every dep now self-contained, no /opt/homebrew left, and
        # libfido2 actually got compiled in and bundled (guards the silent
        # HAVE_FIDO2-off regression that shipped 2fa as a dead stub).
        echo "Updated load paths:"
        otool -L emu/MacOSX/InferNode | grep -iE "sdl|fido|cbor|crypto|opus"
        if otool -L emu/MacOSX/InferNode | grep -q "/opt/homebrew"; then
          echo "ERROR: InferNode still references absolute /opt/homebrew paths"; exit 1
        fi
        if ! otool -L emu/MacOSX/InferNode | grep -q "@executable_path/libfido2"; then
          echo "ERROR: libfido2 not linked — FIDO2/YubiKey 2fa would ship as a stub"; exit 1
        fi

    - name: Import signing certificate
      env:
        APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
        APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      run: |
        echo "$APPLE_CERTIFICATE_P12" | base64 --decode > /tmp/certificate.p12
        security create-keychain -p "" build.keychain
        security default-keychain -s build.keychain
        security unlock-keychain -p "" build.keychain
        security import /tmp/certificate.p12 -k build.keychain \
          -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productsign
        security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
        security find-identity -v -p codesigning build.keychain
        rm /tmp/certificate.p12

    - name: Package self-contained app bundle
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        APP="InferNode.app"
        CONTENTS="$APP/Contents"
        MACOS="$CONTENTS/MacOS"
        RESOURCES="$CONTENTS/Resources"

        # Start from the checked-out .app bundle (has Info.plist, icon, launcher)
        cp -a MacOSX/Infernode.app "$APP"

        # Emulator binary and bundled dylibs (SDL3, opus, libfido2 + its
        # cbor/crypto deps) go in Contents/MacOS/ alongside the @executable_path
        # references rewritten in the Prepare step. Stripped for release.
        cp emu/MacOSX/InferNode "$MACOS/emu"
        cp emu/MacOSX/*.dylib "$MACOS/"

        # Native tools
        mkdir -p "$MACOS/tools"
        cp MacOSX/arm64/bin/limbo MacOSX/arm64/bin/mk "$MACOS/tools/"

        # Strip debug symbols before signing
        strip "$MACOS/emu" "$MACOS/tools/limbo" "$MACOS/tools/mk"

        # Runtime tree goes in Contents/Resources/
        for d in dis lib fonts module services locale usr mnt; do
          [ -d "$d" ] && cp -a "$d" "$RESOURCES/"
        done
        mkdir -p "$RESOURCES/tmp" "$RESOURCES/usr/inferno/secstore" "$RESOURCES/usr/inferno/tmp"

        # Set distribution defaults for LLM config
        # (dev config may point to internal servers)
        cat > "$RESOURCES/lib/ndb/llm" << 'LLMCONF'
        mode=local
        backend=api
        url=https://api.anthropic.com
        model=claude-sonnet-4-5-20250929
        dial=
        LLMCONF
        cp mkconfig "$RESOURCES/"
        [ -d mkfiles ] && cp -a mkfiles "$RESOURCES/"

        # Docs and build scripts in Resources
        for f in LICENCE NOTICE TRADEMARK.md README.md QUICKSTART.md \
                 build-macos-sdl3.sh build-macos-headless.sh makemk.sh; do
          [ -f "$f" ] && cp "$f" "$RESOURCES/"
        done

        # CI guard: refuse to ship testing-only harness files. See CLAUDE.md
        # ring-fence rule. Load-bearing — survives source-tree refactor.
        if find "$APP" \( -name 'serve-agent*' -o -path '*agent-harness*' \) -print -quit | grep -q .; then
          echo "FATAL: testing-only harness files found in release stage:" >&2
          find "$APP" \( -name 'serve-agent*' -o -path '*agent-harness*' \) >&2
          exit 1
        fi

    - name: Sign app bundle
      run: |
        IDENTITY="Developer ID Application: Synectify, Pte Ltd (TJ448C32Q3)"
        APP="InferNode.app"

        cat > /tmp/emu-entitlements.plist << 'PLIST'
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>com.apple.security.cs.allow-jit</key>
            <true/>
            <key>com.apple.security.cs.allow-unsigned-executable-memory</key>
            <true/>
            <key>com.apple.security.device.audio-input</key>
            <true/>
        </dict>
        </plist>
        PLIST

        # Sign innermost binaries first — every bundled dylib (SDL3, opus,
        # libfido2 + cbor/crypto), or notarization rejects the unsigned ones.
        for dylib in "$APP/Contents/MacOS/"*.dylib; do
          [ -f "$dylib" ] && codesign --force --options runtime --timestamp \
            --sign "$IDENTITY" "$dylib"
        done
        codesign --force --options runtime --timestamp \
          --entitlements /tmp/emu-entitlements.plist \
          --sign "$IDENTITY" "$APP/Contents/MacOS/emu"
        for tool in "$APP/Contents/MacOS/tools/limbo" "$APP/Contents/MacOS/tools/mk"; do
          [ -f "$tool" ] && codesign --force --options runtime --timestamp \
            --sign "$IDENTITY" "$tool"
        done
        [ -f "$APP/Contents/MacOS/llm9p" ] && codesign --force --options runtime --timestamp \
          --sign "$IDENTITY" "$APP/Contents/MacOS/llm9p"

        # Sign the entire .app bundle (must be last)
        codesign --force --options runtime --timestamp \
          --entitlements /tmp/emu-entitlements.plist \
          --sign "$IDENTITY" "$APP"
        codesign -dvv "$APP"

    - name: Create and notarize DMG
      env:
        APPLE_ID: ${{ secrets.APPLE_ID }}
        APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        DMG="infernode-${VERSION}-macos-arm64.dmg"

        hdiutil create -volname "InferNode" \
          -srcfolder InferNode.app -ov -format UDZO "$DMG"

        xcrun notarytool submit "$DMG" \
          --apple-id "$APPLE_ID" \
          --team-id "$APPLE_TEAM_ID" \
          --password "$APPLE_APP_PASSWORD" \
          --wait --timeout 30m

        xcrun stapler staple "$DMG"
        echo "DMG: $(ls -lh $DMG)"

    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: infernode-macos-arm64-archive
        path: infernode-*-macos-arm64.dmg
        retention-days: 3

  # ─────────────────────────────────────────────
  # Windows AMD64: SDL3 GUI emulator + launcher
  # ─────────────────────────────────────────────
  windows-amd64:
    name: Windows AMD64
    runs-on: windows-2022
    timeout-minutes: 45
    permissions:
      contents: read
    env:
      ROOT: ${{ github.workspace }}
      SDL3_VERSION: "3.2.20"

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Extract version from tag
      id: version
      shell: pwsh
      run: |
        $version = "${{ github.ref_name }}" -replace '^v',''
        echo "version=$version" >> $env:GITHUB_OUTPUT

    - name: Install build dependencies (win_bison via choco)
      shell: pwsh
      run: |
        # Verify the package actually landed, not just choco's exit code.
        # The Chocolatey community feed intermittently returns an HTML
        # error page instead of XML ("not valid XML" -> "0/0 packages")
        # yet still exits 0, so an exit-code-only check goes green with no
        # bison installed and the build hangs scanning for it later. Probe
        # for win_bison.exe after each attempt and retry until it appears.
        $attempts = 3
        for ($attempt = 1; $attempt -le $attempts; $attempt++) {
          choco install winflexbison3 -y --no-progress
          $bin = Get-ChildItem -Path "$env:ProgramData\chocolatey\lib\winflexbison3" -Filter win_bison.exe -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($bin) {
            Write-Host "win_bison.exe installed at $($bin.FullName)"
            break
          }
          if ($attempt -eq $attempts) {
            throw "Failed to install winflexbison3 after $attempts attempts (win_bison.exe not found; likely a Chocolatey feed outage)"
          }
          Write-Warning "winflexbison3 not installed on attempt $attempt (choco exit $LASTEXITCODE, win_bison.exe missing); retrying..."
          Start-Sleep -Seconds (15 * $attempt)
        }

    - name: Setup MSVC environment
      uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1.13.0
      with:
        arch: amd64

    - name: Stamp build version
      shell: pwsh
      run: |
        $VERSION = "${{ steps.version.outputs.version }}"
        $BUILD_DATE = Get-Date -Format "yyyyMMdd"
        $SHORT_SHA = "${{ github.sha }}".Substring(0, 8)
        $versionFile = "${{ github.workspace }}\include\version.h"
        (Get-Content $versionFile) -replace 'InferNode 0.1', "InferNode $VERSION build $BUILD_DATE-$SHORT_SHA" | Set-Content $versionFile
        Write-Host "Version: $(Get-Content $versionFile)"

    - name: Download SDL3 development libraries
      shell: pwsh
      run: |
        $v = $env:SDL3_VERSION
        $url = "https://github.com/libsdl-org/SDL/releases/download/release-$v/SDL3-devel-$v-VC.zip"
        Write-Host "Downloading $url"
        Invoke-WebRequest -Uri $url -OutFile sdl3-devel.zip -UseBasicParsing
        Expand-Archive -Path sdl3-devel.zip -DestinationPath sdl3-extract -Force
        $sdl3Root = (Get-ChildItem sdl3-extract -Directory | Select-Object -First 1).FullName
        Write-Host "SDL3 at: $sdl3Root"
        if (-not (Test-Path "$sdl3Root\include\SDL3\SDL.h")) { Write-Error "SDL.h not found in SDL3 download"; exit 1 }
        echo "SDL3DIR=$sdl3Root" >> $env:GITHUB_ENV

    - name: Install libfido2 (vcpkg, for /dev/2fa)
      shell: pwsh
      run: |
        # windows-2022 ships a bootstrapped vcpkg at $env:VCPKG_INSTALLATION_ROOT.
        # fido2:x64-windows pulls in libcbor + openssl. Best-effort: if the build
        # fails we still ship a working emu with /dev/2fa as a stub rather than
        # failing the whole release, and the verify step below records which.
        $vcpkg = "$env:VCPKG_INSTALLATION_ROOT\vcpkg.exe"
        if (-not (Test-Path $vcpkg)) { $vcpkg = "C:\vcpkg\vcpkg.exe" }
        if (Test-Path $vcpkg) {
          & $vcpkg install fido2:x64-windows
          $prefix = (Split-Path $vcpkg) + "\installed\x64-windows"
          if (Test-Path "$prefix\include\fido.h") {
            echo "FIDO2DIR=$prefix" >> $env:GITHUB_ENV
            Write-Host "libfido2 installed at $prefix"
          } else {
            Write-Warning "vcpkg ran but fido.h not found under $prefix; /dev/2fa will be a stub"
          }
        } else {
          Write-Warning "vcpkg not found; /dev/2fa will be a stub in this artifact"
        }

    - name: Build (libs, headless emu, .dis tree)
      shell: pwsh
      run: |
        & .\build-windows-amd64.ps1

    - name: Stash headless emu
      shell: pwsh
      run: |
        # build-windows-amd64.ps1 and build-windows-sdl3.ps1 both link to
        # emu\Nt\o.emu.exe, so the GUI build below overwrites the headless
        # emu. Preserve the headless binary so we can ship both bundles.
        Copy-Item "emu\Nt\o.emu.exe" "emu\Nt\o.emu.headless.exe" -Force
        Write-Host "Stashed headless emu as emu\Nt\o.emu.headless.exe"

    - name: Build (SDL3 GUI emu)
      shell: pwsh
      run: |
        # -Fido2Dir is empty when the vcpkg step above did not set FIDO2DIR; the
        # build script then degrades /dev/2fa to a stub instead of failing.
        & .\build-windows-sdl3.ps1 -SDL3Dir $env:SDL3DIR -Fido2Dir "$env:FIDO2DIR"

    - name: Verify libfido2 linkage (/dev/2fa)
      shell: pwsh
      run: |
        # Non-fatal: a stub build is still shippable. Record which we produced so
        # a missing-DLL regression is visible in the release log (INFR-358).
        if (Test-Path "emu\Nt\fido2.dll") {
          Write-Host "fido2.dll bundled — /dev/2fa enabled in the GUI emu"
        } else {
          Write-Warning "fido2.dll not present — /dev/2fa is a stub in this artifact"
        }

    - name: Build (Windows launcher InferNode.exe)
      shell: pwsh
      run: |
        & .\emu\Nt\build-launcher.ps1

    - name: Verify build artefacts
      shell: pwsh
      run: |
        $required = @(
          "emu\Nt\o.emu.exe",          # SDL3 GUI emulator
          "emu\Nt\o.emu.headless.exe", # headless (console) emulator
          "emu\Nt\InferNode.exe",      # Windows-subsystem launcher
          "emu\Nt\SDL3.dll",           # SDL3 runtime
          "Nt\amd64\bin\limbo.exe",    # Limbo compiler
          "Nt\amd64\bin\mk.exe"        # mk build tool
        )
        foreach ($f in $required) {
          if (-not (Test-Path $f)) { Write-Error "Missing: $f"; exit 1 }
          $size = [math]::Round((Get-Item $f).Length / 1KB, 1)
          Write-Host "OK $f ($size KB)"
        }

    - name: Package archives (GUI + headless)
      shell: pwsh
      run: |
        $VERSION = "${{ steps.version.outputs.version }}"

        # Stage the shared payload (toolchain + runtime tree + docs) common to
        # both bundles, then add the GUI- or headless-specific binaries.
        function Stage-Common {
          param([string]$Stage)
          New-Item -ItemType Directory -Force -Path "$Stage\Nt\amd64\bin" | Out-Null
          Copy-Item "Nt\amd64\bin\limbo.exe" "$Stage\Nt\amd64\bin\"
          Copy-Item "Nt\amd64\bin\mk.exe"    "$Stage\Nt\amd64\bin\"
          foreach ($d in @("dis", "lib", "fonts", "module", "services", "locale", "usr", "mnt")) {
            if (Test-Path $d) { Copy-Item -Recurse $d "$Stage\$d" }
          }
          New-Item -ItemType Directory -Force -Path "$Stage\tmp" | Out-Null
          foreach ($f in @("LICENCE", "NOTICE", "TRADEMARK.md", "README.md", "QUICKSTART.md", "setup-windows.ps1", "setup-windows.bat")) {
            if (Test-Path $f) { Copy-Item $f "$Stage\" }
          }
        }

        # CI guard: refuse to ship testing-only harness files. See CLAUDE.md
        # ring-fence rule. Load-bearing — survives source-tree refactor.
        function Assert-NoHarness {
          param([string]$Stage)
          $forbidden = Get-ChildItem -Path $Stage -Recurse -ErrorAction SilentlyContinue | Where-Object {
            $_.Name -like 'serve-agent*' -or $_.FullName -like '*agent-harness*'
          }
          if ($forbidden) {
            Write-Host "FATAL: testing-only harness files found in release stage:"
            $forbidden | ForEach-Object { Write-Host $_.FullName }
            exit 1
          }
        }

        function Write-Zip {
          param([string]$Stage)
          Assert-NoHarness $Stage
          Compress-Archive -Path "$Stage\*" -DestinationPath "$Stage.zip" -CompressionLevel Optimal
          Write-Host "Archive: $Stage.zip ($([math]::Round((Get-Item "$Stage.zip").Length / 1MB, 1)) MB)"
        }

        # GUI bundle: flat layout matching the launcher's expectations —
        # $STAGE\InferNode.exe invokes %dir%\o.emu.exe with -r ., so launcher +
        # GUI emu + SDL3.dll + runtime tree all live at the bundle's top level.
        $GUI = "infernode-$VERSION-windows-amd64-gui"
        Stage-Common $GUI
        Copy-Item "emu\Nt\InferNode.exe" "$GUI\"
        Copy-Item "emu\Nt\o.emu.exe"     "$GUI\"
        Copy-Item "emu\Nt\SDL3.dll"      "$GUI\"
        # FIDO2 runtime DLLs (present only when libfido2 was linked). The build
        # script copied them next to o.emu.exe; bundle whichever exist so
        # /dev/2fa works without a separate libfido2 install.
        foreach ($dll in @("fido2.dll", "cbor.dll", "libcrypto-3-x64.dll", "zlib1.dll")) {
          if (Test-Path "emu\Nt\$dll") { Copy-Item "emu\Nt\$dll" "$GUI\" }
        }
        Write-Zip $GUI

        # Headless bundle: console emulator only, no SDL3. Launch from a
        # console with: o.emu.exe -c1 -r. sh -l
        $HL = "infernode-$VERSION-windows-amd64"
        Stage-Common $HL
        Copy-Item "emu\Nt\o.emu.headless.exe" "$HL\o.emu.exe"
        Write-Zip $HL

    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: infernode-windows-amd64
        path: infernode-*-windows-amd64*.zip
        retention-days: 3

  # ─────────────────────────────────────────────
  # Create GitHub Release with all archives
  # ─────────────────────────────────────────────
  release:
    name: Create Release
    needs: [linux-amd64, linux-amd64-gui, linux-arm64, linux-arm64-gui, macos-arm64, windows-amd64]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
      id-token: write       # cosign keyless signing via Sigstore
      attestations: write   # SLSA build provenance

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Extract version from tag
      id: version
      run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

    - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        path: artifacts
        merge-multiple: true

    - name: Generate SBOM (SPDX)
      # Named infernode-*-sbom.spdx.json so the checksum, cosign-signing and
      # release-upload steps below cover it automatically (no extra wiring).
      # Same pinned action proven CI-verifiable in sbom.yml.
      uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
      with:
        path: .
        format: spdx-json
        output-file: artifacts/infernode-${{ steps.version.outputs.version }}-sbom.spdx.json
        upload-artifact: false

    - name: Generate checksums
      run: |
        cd artifacts
        sha256sum infernode-* > SHA256SUMS.txt
        cat SHA256SUMS.txt

    - name: Install cosign
      uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

    - name: Sign release artifacts
      run: |
        # cosign-installer v4.x ships a cosign that defaults to the new
        # bundle format and treats --output-signature / --output-certificate
        # as deprecated. With the new format they get ignored and cosign
        # then tries to write to an empty --bundle path, failing with
        # "create bundle file: open : no such file or directory". Pass an
        # explicit --bundle path to produce a single .sigstore file per
        # artefact instead of separate .sig/.pem files.
        cd artifacts
        for f in infernode-* SHA256SUMS.txt; do
          cosign sign-blob --yes --bundle "${f}.sigstore" "$f"
        done

    - uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
      with:
        subject-path: artifacts/infernode-*.tar.gz
    - uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
      with:
        subject-path: artifacts/infernode-*.dmg
    - uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
      with:
        subject-path: artifacts/infernode-*.zip

    - name: Create GitHub Release
      uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
      with:
        tag_name: ${{ github.ref_name }}
        name: InferNode ${{ steps.version.outputs.version }}
        draft: true
        prerelease: false
        generate_release_notes: true
        files: |
          artifacts/*
        body: |
          ## InferNode ${{ steps.version.outputs.version }}

          64-bit Inferno® OS for embedded systems, servers, and AI agents.

          ### Downloads

          | Platform | Architecture | File |
          |----------|-------------|------|
          | Linux | AMD64 (SDL3 GUI) | `infernode-${{ steps.version.outputs.version }}-linux-amd64-gui.tar.gz` |
          | Linux | AMD64 (headless) | `infernode-${{ steps.version.outputs.version }}-linux-amd64.tar.gz` |
          | Linux | ARM64 (SDL3 GUI) | `infernode-${{ steps.version.outputs.version }}-linux-arm64-gui.tar.gz` |
          | Linux | ARM64 (headless) | `infernode-${{ steps.version.outputs.version }}-linux-arm64.tar.gz` |
          | macOS | ARM64 (Apple Silicon, SDL3 GUI) | `infernode-${{ steps.version.outputs.version }}-macos-arm64.dmg` |
          | Windows | AMD64 (SDL3 GUI) | `infernode-${{ steps.version.outputs.version }}-windows-amd64-gui.zip` |
          | Windows | AMD64 (headless) | `infernode-${{ steps.version.outputs.version }}-windows-amd64.zip` |

          ### Quick Start

          **macOS:** Open the DMG, drag InferNode.app to Applications, double-click to launch

          **Linux (GUI):** Extract, then `./infernode`

          **Linux (headless):** Extract, then `./infernode-headless`

          **Windows (GUI):** Extract the `-gui` zip, **double-click `setup-windows.bat`** (it clears the Mark-of-the-Web tag from the bundle and configures an LLM backend), then double-click `InferNode.exe`. The launcher embeds an icon and version metadata; the SDL3 GUI emulator and `SDL3.dll` ship in the same zip. Without running `setup-windows.bat` first, Windows SmartScreen silently blocks the unsigned `InferNode.exe` after browser download — see the Code signing section below.

          **Windows (headless):** Extract the zip, double-click `setup-windows.bat` to clear Mark-of-the-Web, then from a console run `o.emu.exe -c1 -r. sh -l`.

          ### Verification

          All release artifacts are signed with [Sigstore](https://sigstore.dev) cosign (keyless), one `.sigstore` bundle per file.

          ```
          cosign verify-blob --bundle <file>.sigstore \
            --certificate-identity-regexp 'github.com/infernode-os/infernode' \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com <file>
          ```

          See `SHA256SUMS.txt` for SHA-256 checksums of all archives.

          ### Code signing

          Windows code signing for this project is provided by the
          [SignPath Foundation](https://signpath.org/), with certificates
          issued by SSL.com. Signed Windows binaries carry verified
          Publisher metadata and accumulate Microsoft SmartScreen
          reputation. Until the signing path is live, unsigned downloads
          are silently blocked by Windows after browser delivery (the
          "Mark of the Web"); `setup-windows.bat` works around this by
          clearing the tag from the bundle on first run — see the
          Windows install bullet above.
