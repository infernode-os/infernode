# Model evaluation scenarios for the InferNode/Veltro harness.
#
# Each scenario probes one specific failure mode. A scenario passes if
# the live model emits tool calls that satisfy `expects` over a
# multi-turn agent loop simulation. `classify_other` patterns
# distinguish *how* a non-pass run failed (a PASS rate isn't enough —
# we want to know whether the failure was wrong tool, mangled args,
# protocol drop, etc).
#
# Scenarios deliberately bias toward *real* user phrasing observed in
# production sessions ("could you do a demo", "your choice") rather
# than imperative single-call probes ("call X with args Y"). Real
# users push models harder than scripted scenarios.

scenarios:

  - name: launch_shell
    category: tool-selection
    description: User asks to launch the shell — model should call launch tool, not the shell tool
    prompt: "Launch the shell."
    expects:
      tool: launch
      args_starts_with: "shell"

  - name: launch_charon_with_url
    category: tool-selection
    description: User says open Charon at a URL — model should call launch with the URL inline
    prompt: "Open Charon at https://example.com"
    expects:
      tool: launch
      args_contains_all: ["charon", "example.com"]

  - name: present_mermaid_demo
    category: tool-grammar
    description: Open-ended demo request — model should follow the create→write workflow with no fence
    prompt: "Could you present a mermaid demo?"
    expects:
      multi_call:
        - tool: present
          args_contains_all: ["create", "mermaid"]
        - tool: present
          args_starts_with: "write"
    classify_other:
      FENCE_IN_CONTENT: {tool_args_contains: ["```mermaid", "```"]}
      QUOTED_CONTENT: {tool_args_matches_regex: '^write \S+ "'}

  - name: julia_fractal
    category: tool-selection
    description: User asks for a fractal view — model should NOT render via mermaid; should launch fractals + drive fractal tool
    prompt: "Show me a Julia fractal at -0.4 + 0.6i"
    expects:
      multi_call:
        - tool: launch
          args_contains: "fractal"
        - tool: fractal
          args_contains: "julia"
    classify_other:
      WRONG_TOOL_PRESENT: {tool: present}

  - name: open_editor_at_file
    category: tool-selection
    description: Compound request — launch editor + open file
    prompt: "Open the editor and show me /usr/me/notes.txt"
    expects:
      multi_call:
        - tool: launch
          args_contains: "editor"
        - tool: editor
          args_contains_all: ["open", "notes.txt"]

  - name: editor_display_message
    category: tool-grammar
    description: Display a literal message in the editor — args is text, not a path
    setup_turns: ["Launch the editor."]
    prompt: "Display 'Hello from Veltro!' in the editor."
    expects:
      tool: editor
      args_starts_with: "write "
      args_excludes: ["/tmp/", "/", "{"]
    classify_other:
      PATH_PREFIX: {tool_args_matches_regex: '^write\s+/'}
      JSON_LEAK_IN_CONTENT: {content_contains_any: ['{"path"', '{"name"', '"arguments"']}
      WRONG_SUBCMD: {tool_args_starts_with_none_of: ["write ", "append "]}

  - name: editor_read_recovery
    category: error-recovery
    description: After a malformed read (path arg), the model should retry with 'read body' on the next turn
    setup_turns:
      - "Launch the editor."
      - {turn_kind: simulated_failure, prompt: "Read what's in the editor."}
    prompt: "What does it say?"
    expects:
      tool: editor
      args_in_set: ["read", "read body"]

  - name: confidence_after_success
    category: model-character
    description: After a successful tool call, model should NOT claim it failed
    setup_turns:
      - "Launch the editor."
      - "Display 'Hello' in the editor."
    prompt: "Did that work?"
    classify_other:
      FALSE_INCAPACITY: {content_contains_any: ["I cannot", "I'm unable", "doesn't support"]}
    # No tool call expected; this is a content-quality probe.

  - name: ambiguous_demo_request
    category: model-character
    description: Open-ended "your choice" should result in action, not clarifying questions
    setup_turns: ["Launch the editor."]
    prompt: "Display whatever message you like in the editor."
    expects:
      tool: editor
      args_starts_with: "write "
    classify_other:
      ASKED_INSTEAD: {content_matches_regex: 'what.*would you like|what.*should I'}
